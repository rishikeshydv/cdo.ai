model_name: Qwen/Qwen2.5-14B-Instruct
train_jsonl: data/sft_train.jsonl
val_jsonl: data/sft_val.jsonl
out_dir: artifacts/checkpoints/sft_qwen25_14b

max_seq_len: 4096

lr: 1.0e-4
epochs: 1.0
seed: 1337

per_device_train_batch_size: 1
per_device_eval_batch_size: 1
gradient_accumulation_steps: 16

warmup_ratio: 0.03
logging_steps: 10
eval_steps: 50
save_steps: 100
save_total_limit: 2

lora_r: 16
lora_alpha: 32
lora_dropout: 0.05

load_in_4bit: true
bf16: true
fp16: false
dataloader_num_workers: 2
